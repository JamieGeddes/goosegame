name: Feature request
description: Suggest a new feature, improvement, or idea for the game
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of the feature or change.
      placeholder: e.g. Add a librarian character who chases the goose when books are stolen.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what experience does it add?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How might this work? Mechanics, UI, flow, etc. Rough ideas are fine.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they're less appealing.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references to other games, related issues, etc.
    validations:
      required: false
